services:
  - type: web
    name: church-website-api
    env: python
    buildCommand: pip install -r Backend/requirements.txt
    startCommand: cd Backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: church-website-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        sync: false
      - key: DEFAULT_BISHOP_USERNAME
        sync: false
      - key: DEFAULT_BISHOP_PASSWORD
        sync: false
      - key: DEFAULT_BISHOP_FULL_NAME
        sync: false
      - key: DEFAULT_BISHOP_PHONE
        sync: false

databases:
  - name: church-website-db
    databaseName: church_website
    user: church_website_user
