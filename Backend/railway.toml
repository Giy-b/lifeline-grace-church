[build]
builder = "RAILPACK"
# Python is pinned in mise.toml. The Mise Python attestation check is disabled
# there to avoid GitHub artifact-attestation lookup failures during Railpack builds.
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
